<svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
  <rect width="600" height="750" fill="#1a1a1f"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="600" height="750" fill="url(#grid)"/>
  <!-- Hanger icon -->
  <g transform="translate(300, 310)">
    <circle cx="0" cy="-70" r="10" fill="none" stroke="rgba(168,85,247,0.5)" stroke-width="3"/>
    <path d="M 0 -60 L 0 -40" stroke="rgba(168,85,247,0.5)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0 -40 Q -80 -10 -90 30 Q -95 50 -70 55 L 70 55 Q 95 50 90 30 Q 80 -10 0 -40 Z"
          fill="none" stroke="rgba(168,85,247,0.5)" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <!-- NexCart label -->
  <text x="300" y="445" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600"
        letter-spacing="3"
        fill="rgba(168,85,247,0.6)">NEXCART</text>
  <text x="300" y="470" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11"
        fill="rgba(255,255,255,0.2)">Image unavailable</text>
</svg>
