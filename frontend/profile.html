<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | NexCart</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --primary: #9333ea;
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-md: 12px;
            --radius-lg: 20px;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ─── HEADER ─── */
        header {
            height: 70px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .btn-icon {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid var(--bg-body);
        }

        /* ─── DASHBOARD LAYOUT ─── */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            margin-top: 40px;
            margin-bottom: 80px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background: var(--bg-glass);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(147, 51, 234, 0.1);
            border-color: rgba(147, 51, 234, 0.3);
            color: #c084fc;
        }

        .sidebar-item i {
            font-size: 1.2rem;
        }

        .content-panel {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 20px;
        }

        /* ─── PROFILE HEADER ─── */
        .profile-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
        }

        .profile-avatar-wrap {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            background: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* ─── FORMS ─── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #0f0f11;
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            font-family: var(--font-body);
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: #161618;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.5);
        }

        /* ─── ORDER CARDS ─── */
        .order-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            border-bottom: 1px solid var(--border-glass);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-img {
            width: 60px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #27272a;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-Pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .status-Delivered {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        /* ─── ADDRESS CARDS ─── */
        .address-item {
            position: relative;
            padding: 20px;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .address-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        /* ─── TOASTS ─── */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: #18181b;
            border: 1px solid var(--border-glass);
            padding: 16px 24px;
            border-radius: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s forwards;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display:flex; width:100%;">
            <a href="id.html" class="logo"><i class="ph-fill ph-shopping-bag"></i> NexCart</a>
            <div class="nav-right">
                <a href="id.html#cart" class="btn-icon">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="badge" id="cart-count">0</span>
                </a>
                <button class="btn-primary" onclick="window.location.href='id.html'"><i class="ph ph-house"></i>
                    Home</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-item active" onclick="showPanel('profile', this)">
                    <i class="ph ph-user"></i> Profile Info
                </div>
                <div class="sidebar-item" onclick="showPanel('orders', this)">
                    <i class="ph ph-package"></i> My Orders
                </div>
                <div class="sidebar-item" onclick="showPanel('address', this)">
                    <i class="ph ph-map-pin"></i> Saved Addresses
                </div>
                <div class="sidebar-item" onclick="showPanel('settings', this)">
                    <i class="ph ph-gear"></i> Settings
                </div>
                <div class="sidebar-item" style="margin-top:auto; color:var(--error);" onclick="logoutUser()">
                    <i class="ph ph-sign-out"></i> Logout
                </div>
            </aside>

            <div class="content">
                <!-- PANEL: PROFILE -->
                <div id="panel-profile" class="content-panel active">
                    <div class="profile-hero">
                        <div class="profile-avatar-wrap">
                            <div id="profile-initials" class="profile-avatar">J</div>
                            <button class="edit-avatar-btn"><i class="ph ph-pencil"></i></button>
                        </div>
                        <div>
                            <h1 id="display-name" style="font-family:var(--font-display); font-size:1.8rem;">User Name
                            </h1>
                            <p id="display-email" style="color:var(--text-muted);">user@example.com</p>
                        </div>
                    </div>

                    <div class="glass-card">
                        <h3 style="margin-bottom:20px;">Personal Details</h3>
                        <form id="profile-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" id="input-name" placeholder="Enter name">
                                </div>
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input type="text" id="input-phone" placeholder="Enter phone">
                                </div>
                            </div>
                            <button type="submit" class="btn-primary"><i class="ph ph-check"></i> Save Changes</button>
                        </form>
                    </div>
                </div>

                <!-- PANEL: ORDERS -->
                <div id="panel-orders" class="content-panel">
                    <h2 style="margin-bottom:24px; font-family:var(--font-display);">My Orders</h2>
                    <div class="glass-card" id="orders-container" style="padding:0;">
                        <!-- Orders will be injected here -->
                    </div>
                </div>

                <!-- PANEL: ADDRESS -->
                <div id="panel-address" class="content-panel">
                    <div class="flex-between"
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                        <h2 style="font-family:var(--font-display);">Saved Addresses</h2>
                        <button class="btn-primary" onclick="showAddressForm()"><i class="ph ph-plus"></i> Add
                            New</button>
                    </div>

                    <div id="address-list">
                        <!-- Addresses injected here -->
                    </div>

                    <div id="address-form-wrap" class="glass-card" style="display:none;">
                        <h3 id="addr-form-title">Add New Address</h3>
                        <form id="address-form" style="margin-top:20px;">
                            <input type="hidden" id="addr-id">
                            <div class="form-group">
                                <label>Street Address</label>
                                <input type="text" id="addr-street" required>
                            </div>
                            <div class="form-grid">
                                <div class="form-group"><label>City</label><input type="text" id="addr-city" required>
                                </div>
                                <div class="form-group"><label>State</label><input type="text" id="addr-state" required>
                                </div>
                            </div>
                            <div class="form-grid">
                                <div class="form-group"><label>Zip Code</label><input type="text" id="addr-zip"
                                        required></div>
                                <div class="form-group"
                                    style="display:flex; align-items:center; gap:10px; padding-top:25px;">
                                    <input type="checkbox" id="addr-default" style="width:20px; height:20px;">
                                    <label style="margin:0;">Set as default</label>
                                </div>
                            </div>
                            <div style="display:flex; gap:12px; margin-top:20px;">
                                <button type="submit" class="btn-primary">Save Address</button>
                                <button type="button" class="btn-outline" onclick="hideAddressForm()"
                                    style="background:none; border:1px solid var(--border-glass); color:white; padding:12px 24px; border-radius:10px; cursor:pointer;">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- PANEL: SETTINGS -->
                <div id="panel-settings" class="content-panel">
                    <h2 style="margin-bottom:24px; font-family:var(--font-display);">Account Settings</h2>
                    <div class="glass-card">
                        <h3 style="margin-bottom:20px;">Change Password</h3>
                        <form id="password-form">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="current-pass" required>
                            </div>
                            <div class="form-group">
                                <label>New Password (min 8 characters)</label>
                                <input type="password" id="new-pass" required>
                            </div>
                            <button type="submit" class="btn-primary">Update Password</button>
                        </form>
                    </div>
                </div>

                <!-- PANEL: ORDER DETAILS -->
                <div id="panel-order-details" class="content-panel">
                    <button class="btn-outline"
                        onclick="showPanel('orders', document.querySelector('[onclick=\'showPanel(\\\'orders\\\', this)\\\']'))"
                        style="background:none; border:1px solid var(--border-glass); color:white; padding:8px 16px; border-radius:10px; cursor:pointer; margin-bottom:20px; display:inline-flex; align-items:center; gap:8px;">
                        <i class="ph ph-arrow-left"></i> Back to Orders
                    </button>

                    <div class="glass-card" id="detail-content">
                        <!-- Order details injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="profile.js"></script>
</body>

</html>
