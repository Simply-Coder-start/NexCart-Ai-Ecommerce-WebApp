<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | NexCart</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 440px; margin: 40px auto; padding: 16px; }
    h1 { margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    input { width: 100%; padding: 10px; box-sizing: border-box; }
    button { padding: 10px 14px; width: 100%; cursor: pointer; }
    #signup-message { display: none; margin: 10px 0; }
    .helper { margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Create Account</h1>
  <form id="signup-form">
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="John Doe" required />
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" name="phone" placeholder="+911234567890" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" minlength="8" placeholder="Min 8 characters" required />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" minlength="8" placeholder="Re-enter password" required />
    </div>
    <div id="signup-message"></div>
    <button id="signup-submit" type="submit">Create Account</button>
  </form>

  <p class="helper">Already have an account? <a href="./login.html">Sign in</a></p>

  <script src="./auth.js"></script>
</body>
</html>
